<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地板材料計算器</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    :root{--bg:#f5f2ed;--surface:#fff;--surface-2:#faf8f5;--text:#1a1a1a;--text-muted:#7a746e;--accent:#2d5a4a;--accent-hover:#234839;--accent-soft:#e8f0ec;--border:#e0dbd2;--border-strong:#cfc7ba;--danger:#9b3b32;--danger-soft:#fbeae8;--radius:12px;--radius-sm:8px;--shadow:0 2px 12px rgba(0,0,0,.07);--shadow-lg:0 4px 24px rgba(0,0,0,.1);--font:system-ui,-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;color-scheme:light}
    @media(prefers-color-scheme:dark){:root:not([data-theme="light"]){--bg:#1a1917;--surface:#242322;--surface-2:#2a2928;--text:#e8e4df;--text-muted:#9b9590;--accent:#4a8c73;--accent-hover:#3d7962;--accent-soft:rgba(74,140,115,.2);--border:#3a3632;--border-strong:#4a4540;--danger:#c45b52;--danger-soft:rgba(196,91,82,.25);--shadow:0 2px 12px rgba(0,0,0,.35);--shadow-lg:0 4px 24px rgba(0,0,0,.45);color-scheme:dark}}
    [data-theme="dark"]{--bg:#1a1917;--surface:#242322;--surface-2:#2a2928;--text:#e8e4df;--text-muted:#9b9590;--accent:#4a8c73;--accent-hover:#3d7962;--accent-soft:rgba(74,140,115,.2);--border:#3a3632;--border-strong:#4a4540;--danger:#c45b52;--danger-soft:rgba(196,91,82,.25);--shadow:0 2px 12px rgba(0,0,0,.35);--shadow-lg:0 4px 24px rgba(0,0,0,.45);color-scheme:dark}
    body{margin:0;min-height:100vh;font-family:var(--font);font-size:16px;line-height:1.55;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
    .app{max-width:520px;margin:0 auto;padding:clamp(1rem,4vw,2rem) 1.25rem 3rem}
    .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
    .app-header h1{margin:0;font-size:clamp(1.25rem,3.5vw,1.75rem);font-weight:700;letter-spacing:-.01em;color:var(--text)}
    .theme-toggle{width:44px;height:44px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);display:grid;place-items:center;cursor:pointer;transition:background .2s,border-color .2s,transform .12s;flex-shrink:0}
    .theme-toggle:hover{background:var(--surface-2);border-color:var(--border-strong)}
    .theme-toggle:active{transform:scale(.96)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
    .card-title{display:flex;align-items:center;gap:.5rem;margin:0 0 1rem;font-size:1.05rem;font-weight:650;color:var(--text)}
    .card-title::before{content:"";width:3px;height:1.1em;background:var(--accent);border-radius:2px;flex-shrink:0}
    .field-grid{display:grid;gap:1rem}
    @media(min-width:600px){.field-grid.grid-3{grid-template-columns:repeat(3,1fr)}}
    .field{display:flex;flex-direction:column;gap:.35rem}
    .field label{font-size:.875rem;font-weight:600;color:var(--text)}
    .field .hint{font-size:.8rem;color:var(--text-muted)}
    .input{width:100%;min-height:48px;padding:.65rem .75rem;font:inherit;font-size:1rem;color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);transition:border-color .2s,box-shadow .2s,background .2s}
    .input:hover{border-color:var(--border-strong)}
    .input:focus{outline:none;border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft)}
    .input::placeholder{color:var(--text-muted)}
    .waste-field{max-width:200px}
    .areas-header{display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;margin-bottom:1rem}
    .areas-header .card-title{margin:0}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;padding:.6rem 1.1rem;font:inherit;font-size:.95rem;font-weight:600;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:background .2s,transform .12s,box-shadow .2s;min-height:44px;white-space:nowrap}
    .btn:active{transform:scale(.98)}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-primary:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    .btn-ghost{background:transparent;color:var(--danger);border:1px solid var(--danger-soft);font-size:.85rem}
    .btn-ghost:hover{background:var(--danger-soft)}
    .btn-ghost:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
    .areas-list{display:flex;flex-direction:column;gap:.85rem}
    .area-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.15rem;transition:box-shadow .2s}
    .area-card:focus-within{box-shadow:var(--shadow);border-color:var(--border-strong)}
    .area-card-head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.75rem}
    .area-card-head h3{margin:0;font-size:1rem;font-weight:650;color:var(--accent)}
    .area-fields{display:grid;gap:.75rem}
    @media(min-width:640px){.area-fields{grid-template-columns:1.2fr 1fr 1fr}}
    .area-subtotal{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;padding-top:.65rem;border-top:1px dashed var(--border);margin-top:.25rem}
    @media(max-width:480px){.area-subtotal{grid-template-columns:1fr}}
    .subtotal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .75rem}
    .subtotal-box .label{font-size:.75rem;font-weight:600;color:var(--text-muted)}
    .subtotal-box .value{font-size:1rem;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
    .results-grid{display:grid;gap:.75rem}
    @media(min-width:600px){.results-grid{grid-template-columns:1fr 1fr}}
    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.15rem;min-height:100%}
    .result-card .result-label{font-size:.875rem;font-weight:600;color:var(--text-muted);margin-bottom:.5rem;line-height:1.35}
    .result-card .dual{display:flex;flex-direction:column;gap:.2rem}
    .result-card .dual span{font-size:1rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text)}
    .result-card .dual .unit{font-size:.8rem;font-weight:600;color:var(--text-muted)}
    .result-card.highlight{background:var(--accent);border-color:transparent;color:#fff;box-shadow:var(--shadow-lg)}
    .result-card.highlight .result-label{color:rgba(255,255,255,.85)}
    .result-card.highlight .pack-value{font-size:2.25rem;font-weight:800;line-height:1.1;font-variant-numeric:tabular-nums}
    .result-card.highlight .pack-unit{font-size:.9rem;opacity:.9;margin-top:.25rem}
    .result-card.placeholder .dual span,.result-card.placeholder .pack-value{color:var(--text-muted);font-weight:600}
    @media(min-width:600px){.result-card.highlight{grid-column:span 2}}
    .app-footer{text-align:center;margin-top:1.5rem;font-size:.75rem;color:var(--text-muted)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
    @media print{body{background:#fff!important;color:#000!important}.theme-toggle,.btn-ghost{display:none!important}.card,.area-card{box-shadow:none!important;border:1px solid #ccc!important;break-inside:avoid}.input{border:none;padding:0;background:transparent;font-size:.9rem}.result-card.highlight{background:#eee!important;color:#000!important;border-color:#ccc!important}.result-card.highlight .result-label{color:#333!important}.app-footer{display:none}}
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>地板材料計算器</h1>
      <button class="theme-toggle" data-theme-toggle aria-label="切換深淺色模式">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <main class="app-main">
      <section class="card" aria-labelledby="product-heading">
        <h2 class="card-title" id="product-heading">地板產品資料</h2>
        <div class="field-grid grid-3">
          <div class="field">
            <label for="plank-length">地板長度（毫米）</label>
            <input type="number" id="plank-length" class="input" min="0" step="1" placeholder="例如 1220" value="1220" inputmode="decimal">
            <span class="hint">單片長度</span>
          </div>
          <div class="field">
            <label for="plank-width">地板闊度（毫米）</label>
            <input type="number" id="plank-width" class="input" min="0" step="1" placeholder="例如 180" value="180" inputmode="decimal">
            <span class="hint">單片闊度</span>
          </div>
          <div class="field">
            <label for="pieces-per-pack">每包片數</label>
            <input type="number" id="pieces-per-pack" class="input" min="0" step="1" placeholder="例如 8" value="8" inputmode="numeric">
            <span class="hint">每包包含片數</span>
          </div>
        </div>
      </section>

      <section class="card" aria-labelledby="waste-heading">
        <h2 class="card-title" id="waste-heading">損耗設定</h2>
        <div class="field waste-field">
          <label for="waste-percent">損耗百分比（%）</label>
          <input type="number" id="waste-percent" class="input" min="0" step="0.1" value="10" inputmode="decimal">
          <span class="hint">裁邊預留比例</span>
        </div>
      </section>

      <section class="card" aria-labelledby="areas-heading">
        <div class="areas-header">
          <h2 class="card-title" id="areas-heading">施工區域</h2>
          <button type="button" class="btn btn-primary" id="add-area-btn" aria-label="新增施工區域">＋ 新增區域</button>
          <button type="button" class="btn btn-ghost" id="reset-btn" aria-label="重設所有數值">重設</button>
        </div>
        <div class="areas-list" id="areas-list" role="list"></div>
      </section>

      <section class="card" aria-labelledby="results-heading" aria-live="polite">
        <h2 class="card-title" id="results-heading">計算結果</h2>
        <div class="results-grid">
          <div class="result-card" id="result-total-area">
            <div class="result-label">總施工面積</div>
            <div class="dual">
              <span><span class="unit">平方米（m²）</span> <span data-m2>0.00</span></span>
              <span><span class="unit">平方呎（ft²）</span> <span data-ft2>0.00</span></span>
            </div>
          </div>
          <div class="result-card" id="result-waste-area">
            <div class="result-label">加損耗後面積</div>
            <div class="dual">
              <span><span class="unit">平方米（m²）</span> <span data-m2>0.00</span></span>
              <span><span class="unit">平方呎（ft²）</span> <span data-ft2>0.00</span></span>
            </div>
          </div>
          <div class="result-card" id="result-pack-coverage">
            <div class="result-label">每包覆蓋面積</div>
            <div class="dual">
              <span><span class="unit">平方米（m²）</span> <span data-m2>0.00</span></span>
              <span><span class="unit">平方呎（ft²）</span> <span data-ft2>0.00</span></span>
            </div>
          </div>
          <div class="result-card highlight" id="result-packs">
            <div class="result-label">所需包數</div>
            <div class="pack-value" data-packs>0</div>
            <div class="pack-unit">包（已向上取整）</div>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      換算：1 平方米 = 10.7639 平方呎 · 面積以有效輸入即時計算
    </footer>
  </div>

  <template id="area-card-template">
    <article class="area-card" role="listitem" data-area-id="">
      <div class="area-card-head">
        <h3 class="area-title"></h3>
        <button type="button" class="btn btn-ghost remove-area-btn">刪除區域</button>
      </div>
      <div class="area-fields">
        <div class="field">
          <label class="area-name-label">區域名稱</label>
          <input type="text" class="input area-name" placeholder="例如 客廳" maxlength="40">
        </div>
        <div class="field">
          <label class="area-length-label">長度（米）</label>
          <input type="number" class="input area-length" min="0" step="0.01" placeholder="0" inputmode="decimal">
        </div>
        <div class="field">
          <label class="area-width-label">闊度（米）</label>
          <input type="number" class="input area-width" min="0" step="0.01" placeholder="0" inputmode="decimal">
        </div>
      </div>
      <div class="area-subtotal" aria-label="區域面積">
        <div class="subtotal-box">
          <div class="label">區域面積 · 平方米（m²）</div>
          <div class="value area-m2">0.00</div>
        </div>
        <div class="subtotal-box">
          <div class="label">區域面積 · 平方呎（ft²）</div>
          <div class="value area-ft2">0.00</div>
        </div>
      </div>
    </article>
  </template>

  <script>
    (function () {
      "use strict";

      const M2_TO_FT2 = 10.763910416709722;

      const plankLengthEl = document.getElementById("plank-length");
      const plankWidthEl = document.getElementById("plank-width");
      const piecesPerPackEl = document.getElementById("pieces-per-pack");
      const wastePercentEl = document.getElementById("waste-percent");
      const areasListEl = document.getElementById("areas-list");
      const addAreaBtn = document.getElementById("add-area-btn");
      const areaTemplate = document.getElementById("area-card-template");

      let areaCounter = 0;

      function parseNonNegative(value) {
        const n = parseFloat(value);
        if (Number.isNaN(n) || n < 0) return 0;
        return n;
      }

      function formatArea(m2) {
        return m2.toLocaleString("zh-Hant", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function m2ToFt2(m2) {
        return m2 * M2_TO_FT2;
      }

      function setDualUnits(container, m2) {
        const m2El = container.querySelector("[data-m2]");
        const ft2El = container.querySelector("[data-ft2]");
        if (m2El) m2El.textContent = formatArea(m2);
        if (ft2El) ft2El.textContent = formatArea(m2ToFt2(m2));
      }

      function clampInput(el) {
        if (el.value === "" || el.value === "-") return;
        const n = parseFloat(el.value);
        if (!Number.isNaN(n) && n < 0) el.value = "0";
      }

      function getPlankAreaM2() {
        const lengthMm = parseNonNegative(plankLengthEl.value);
        const widthMm = parseNonNegative(plankWidthEl.value);
        const lengthM = lengthMm / 1000;
        const widthM = widthMm / 1000;
        return lengthM * widthM;
      }

      function getPackCoverageM2() {
        const plankArea = getPlankAreaM2();
        const pieces = parseNonNegative(piecesPerPackEl.value);
        return plankArea * pieces;
      }

      function collectAreas() {
        const cards = areasListEl.querySelectorAll(".area-card");
        let totalM2 = 0;
        const areas = [];

        cards.forEach(function (card) {
          const length = parseNonNegative(card.querySelector(".area-length").value);
          const width = parseNonNegative(card.querySelector(".area-width").value);
          const subM2 = length * width;
          totalM2 += subM2;

          const m2El = card.querySelector(".area-m2");
          const ft2El = card.querySelector(".area-ft2");
          if (m2El) m2El.textContent = formatArea(subM2);
          if (ft2El) ft2El.textContent = formatArea(m2ToFt2(subM2));

          areas.push({ card, subM2 });
        });

        return { totalM2, areas };
      }

      function updateResults() {
        const { totalM2 } = collectAreas();
        const wastePct = parseNonNegative(wastePercentEl.value);
        const packCoverage = getPackCoverageM2();
        const withWaste = totalM2 * (1 + wastePct / 100);

        let packs = 0;
        let isPlaceholder = false;
        if (packCoverage > 0 && withWaste > 0) {
          packs = Math.ceil(withWaste / packCoverage);
        } else if (packCoverage <= 0 && withWaste > 0) {
          isPlaceholder = true;
        }

        setDualUnits(document.getElementById("result-total-area"), totalM2);
        setDualUnits(document.getElementById("result-waste-area"), withWaste);
        setDualUnits(document.getElementById("result-pack-coverage"), packCoverage);

        const packsEl = document.querySelector("#result-packs [data-packs]");
        const packsCard = document.getElementById("result-packs");
        packsCard.classList.toggle("placeholder", isPlaceholder);
        if (packsEl) {
          packsEl.textContent = isPlaceholder ? "—" : String(packs);
        }
      }

      function bindAreaCard(card) {
        const inputs = card.querySelectorAll("input");
        inputs.forEach(function (input) {
          input.addEventListener("input", function () {
            clampInput(input);
            updateResults();
          });
        });

        const removeBtn = card.querySelector(".remove-area-btn");
        removeBtn.addEventListener("click", function () {
          const count = areasListEl.querySelectorAll(".area-card").length;
          if (count <= 1) return;
          card.remove();
          renumberAreas();
          updateRemoveButtons();
          updateResults();
        });
      }

      function renumberAreas() {
        const cards = areasListEl.querySelectorAll(".area-card");
        cards.forEach(function (card, index) {
          const num = index + 1;
          const title = card.querySelector(".area-title");
          const nameInput = card.querySelector(".area-name");
          if (title) title.textContent = "區域 " + num;
          if (nameInput && !nameInput.dataset.userNamed) {
            const defaultName = "區域 " + num;
            if (!nameInput.value || nameInput.value.match(/^區域 \d+$/)) {
              nameInput.value = defaultName;
              nameInput.placeholder = defaultName;
            }
          }
          card.setAttribute("aria-label", "施工區域 " + num);
        });
      }

      function updateRemoveButtons() {
        const count = areasListEl.querySelectorAll(".area-card").length;
        areasListEl.querySelectorAll(".remove-area-btn").forEach(function (btn) {
          btn.disabled = count <= 1;
        });
      }

      function createAreaCard() {
        areaCounter += 1;
        const clone = areaTemplate.content.cloneNode(true);
        const card = clone.querySelector(".area-card");
        card.dataset.areaId = String(areaCounter);

        const nameInput = card.querySelector(".area-name");
        nameInput.addEventListener("input", function () {
          nameInput.dataset.userNamed = nameInput.value.trim() ? "1" : "";
          updateResults();
        });

        areasListEl.appendChild(clone);
        const mounted = areasListEl.lastElementChild;
        bindAreaCard(mounted);
        renumberAreas();
        updateRemoveButtons();
        updateResults();
        return mounted;
      }

      [plankLengthEl, plankWidthEl, piecesPerPackEl, wastePercentEl].forEach(function (el) {
        el.addEventListener("input", function () {
          clampInput(el);
          updateResults();
        });
      });

      addAreaBtn.addEventListener("click", function () {
        createAreaCard();
      });

      const resetBtn = document.getElementById("reset-btn");
      resetBtn.addEventListener("click", function () {
        plankLengthEl.value = "1220";
        plankWidthEl.value = "180";
        piecesPerPackEl.value = "8";
        wastePercentEl.value = "0";
        areasListEl.innerHTML = "";
        areaCounter = 0;
        createAreaCard();
      });

      createAreaCard();
    })();
  </script>
</body>
</html>
