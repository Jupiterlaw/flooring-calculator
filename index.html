<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地板材料計算器</title>
  <style>
    :root {
      --bg: #f4f1ec;
      --surface: #ffffff;
      --surface-muted: #faf8f5;
      --border: #e2ddd4;
      --border-strong: #cfc7ba;
      --text: #2c2926;
      --text-muted: #6b6560;
      --accent: #2d5a4a;
      --accent-hover: #234839;
      --accent-soft: #e8f0ec;
      --danger: #9b3b32;
      --danger-soft: #fbeae8;
      --highlight: #c4a574;
      --shadow: 0 4px 24px rgba(44, 41, 38, 0.08);
      --shadow-sm: 0 2px 8px rgba(44, 41, 38, 0.06);
      --radius: 14px;
      --radius-sm: 10px;
      --font: "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      --transition: 0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(196, 165, 116, 0.12), transparent),
        linear-gradient(180deg, #f7f4ef 0%, var(--bg) 100%);
    }

    .app {
      max-width: 1080px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .header p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 36em;
      margin-inline: auto;
    }

    .grid-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    @media (max-width: 768px) {
      .grid-top { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 1.35rem 1.5rem;
    }

    .card-title {
      margin: 0 0 1.1rem;
      font-size: 1.05rem;
      font-weight: 650;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-title::before {
      content: "";
      width: 4px;
      height: 1.1em;
      background: var(--accent);
      border-radius: 2px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    @media (max-width: 600px) {
      .field-grid { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }

    .field .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: -0.15rem;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.75rem;
      font: inherit;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    input:hover {
      border-color: var(--border-strong);
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    input:invalid:not(:placeholder-shown) {
      border-color: var(--danger);
    }

    .areas-section {
      margin-bottom: 1.25rem;
    }

    .areas-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .areas-header .card-title {
      margin: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.6rem 1.1rem;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition), transform 0.1s ease, box-shadow var(--transition);
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger-soft);
      padding: 0.45rem 0.75rem;
      font-size: 0.82rem;
    }

    .btn-ghost:hover {
      background: var(--danger-soft);
    }

    .btn-ghost:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .areas-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .area-card {
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem 1.25rem;
      transition: box-shadow var(--transition);
    }

    .area-card:focus-within {
      box-shadow: var(--shadow-sm);
      border-color: var(--border-strong);
    }

    .area-card-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
    }

    .area-card-head h3 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 650;
      color: var(--accent);
    }

    .area-fields {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 0.85rem;
      margin-bottom: 0.85rem;
    }

    @media (max-width: 640px) {
      .area-fields { grid-template-columns: 1fr; }
    }

    .area-subtotal {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
      padding-top: 0.75rem;
      border-top: 1px dashed var(--border);
    }

    @media (max-width: 480px) {
      .area-subtotal { grid-template-columns: 1fr; }
    }

    .subtotal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.55rem 0.75rem;
    }

    .subtotal-box .label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: none;
      letter-spacing: 0.02em;
    }

    .subtotal-box .value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .waste-field {
      max-width: 200px;
    }

    .results-section .card {
      background: linear-gradient(165deg, #faf8f5 0%, var(--surface) 100%);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    @media (max-width: 900px) {
      .results-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .results-grid { grid-template-columns: 1fr; }
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      min-height: 100%;
    }

    .result-card .result-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      line-height: 1.35;
    }

    .result-card .dual {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .result-card .dual span {
      font-size: 1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .result-card .dual .unit {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .result-card.highlight {
      grid-column: span 1;
      background: linear-gradient(145deg, var(--accent) 0%, #3d7260 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: var(--shadow);
    }

    @media (min-width: 901px) {
      .result-card.highlight { grid-column: span 1; }
    }

    .result-card.highlight .result-label {
      color: rgba(255, 255, 255, 0.85);
    }

    .result-card.highlight .pack-value {
      font-size: 2.25rem;
      font-weight: 800;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .result-card.highlight .pack-unit {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-top: 0.25rem;
    }

    .result-card.placeholder .dual span,
    .result-card.placeholder .pack-value {
      color: var(--text-muted);
      font-weight: 600;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1917;
        --surface: #242322;
        --surface-muted: #2a2928;
        --border: #3a3632;
        --border-strong: #4a4540;
        --text: #e8e4df;
        --text-muted: #9b9590;
        --accent: #4a8c73;
        --accent-hover: #3d7962;
        --accent-soft: rgba(74, 140, 115, 0.2);
        --danger: #c45b52;
        --danger-soft: rgba(196, 91, 82, 0.25);
        --highlight: #d4b88a;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
      }
      body {
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(196, 165, 116, 0.08), transparent),
          linear-gradient(180deg, #222019 0%, var(--bg) 100%);
      }
      .results-section .card {
        background: linear-gradient(165deg, var(--surface-muted) 0%, var(--surface) 100%);
      }
    }

    @media print {
      body { background: #fff; }
      .btn-primary, .btn-ghost { display: none; }
      .card, .area-card { box-shadow: none; border: 1px solid #ccc; }
      input { border: none; padding: 0; background: transparent; font-size: 0.9rem; }
      .area-subtotal { padding: 0.5rem 0; }
      .subtotal-box { border: 1px solid #ccc; }
      .footer-note { display: none; }
      .header p { color: #333; }
      .result-card .dual span { color: #000; }
      .result-card.highlight { background: #eee; color: #000; border-color: #ccc; }
      .result-card.highlight .result-label { color: #333; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>地板材料計算器</h1>
      <p>輸入地板規格及施工區域尺寸，自動計算所需面積與包數。</p>
    </header>

    <div class="grid-top">
      <section class="card" aria-labelledby="product-heading">
        <h2 class="card-title" id="product-heading">地板產品資料</h2>
        <div class="field-grid">
          <div class="field">
            <label for="plank-length">地板長度（毫米）</label>
            <input type="number" id="plank-length" min="0" step="1" placeholder="例如 1220" value="1220" inputmode="decimal" aria-describedby="plank-length-hint">
            <span class="hint" id="plank-length-hint">單片長度</span>
          </div>
          <div class="field">
            <label for="plank-width">地板闊度（毫米）</label>
            <input type="number" id="plank-width" min="0" step="1" placeholder="例如 180" value="180" inputmode="decimal" aria-describedby="plank-width-hint">
            <span class="hint" id="plank-width-hint">單片闊度</span>
          </div>
          <div class="field">
            <label for="pieces-per-pack">每包片數</label>
            <input type="number" id="pieces-per-pack" min="0" step="1" placeholder="例如 8" value="8" inputmode="numeric" aria-describedby="pieces-hint">
            <span class="hint" id="pieces-hint">每包包含片數</span>
          </div>
        </div>
      </section>

      <section class="card" aria-labelledby="waste-heading">
        <h2 class="card-title" id="waste-heading">損耗設定</h2>
        <div class="field waste-field">
          <label for="waste-percent">損耗百分比（%）</label>
          <input type="number" id="waste-percent" min="0" step="0.1" value="10" inputmode="decimal" aria-describedby="waste-hint">
          <span class="hint" id="waste-hint">裁邊預留比例</span>
        </div>
      </section>
    </div>

    <section class="card areas-section" aria-labelledby="areas-heading">
      <div class="areas-header">
        <h2 class="card-title" id="areas-heading">施工區域</h2>
        <button type="button" class="btn btn-primary" id="add-area-btn" aria-label="新增施工區域">
          ＋ 新增區域
        </button>
        <button type="button" class="btn btn-ghost" id="reset-btn" aria-label="重設所有數值">
          重設
        </button>
      </div>
      <div class="areas-list" id="areas-list" role="list"></div>
    </section>

    <section class="results-section" aria-labelledby="results-heading" aria-live="polite">
      <div class="card">
        <h2 class="card-title" id="results-heading">計算結果</h2>
        <div class="results-grid">
          <div class="result-card" id="result-total-area">
            <div class="result-label">總施工面積</div>
            <div class="dual">
              <span><span class="unit">平方米（m²）</span> <span data-m2>0.00</span></span>
              <span><span class="unit">平方呎（ft²）</span> <span data-ft2>0.00</span></span>
            </div>
          </div>
          <div class="result-card" id="result-waste-area">
            <div class="result-label">加損耗後面積</div>
            <div class="dual">
              <span><span class="unit">平方米（m²）</span> <span data-m2>0.00</span></span>
              <span><span class="unit">平方呎（ft²）</span> <span data-ft2>0.00</span></span>
            </div>
          </div>
          <div class="result-card" id="result-pack-coverage">
            <div class="result-label">每包覆蓋面積</div>
            <div class="dual">
              <span><span class="unit">平方米（m²）</span> <span data-m2>0.00</span></span>
              <span><span class="unit">平方呎（ft²）</span> <span data-ft2>0.00</span></span>
            </div>
          </div>
          <div class="result-card highlight" id="result-packs">
            <div class="result-label">所需包數</div>
            <div class="pack-value" data-packs>0</div>
            <div class="pack-unit">包（已向上取整）</div>
          </div>
        </div>
      </div>
    </section>

    <p class="footer-note">換算：1 平方米 = 10.7639 平方呎 · 面積以有效輸入即時計算</p>
  </div>

  <template id="area-card-template">
    <article class="area-card" role="listitem" data-area-id="">
      <div class="area-card-head">
        <h3 class="area-title"></h3>
        <button type="button" class="btn btn-ghost remove-area-btn">刪除區域</button>
      </div>
      <div class="area-fields">
        <div class="field">
          <label class="area-name-label">區域名稱</label>
          <input type="text" class="area-name" placeholder="例如 客廳" maxlength="40">
        </div>
        <div class="field">
          <label class="area-length-label">長度（米）</label>
          <input type="number" class="area-length" min="0" step="0.01" placeholder="0" inputmode="decimal">
        </div>
        <div class="field">
          <label class="area-width-label">闊度（米）</label>
          <input type="number" class="area-width" min="0" step="0.01" placeholder="0" inputmode="decimal">
        </div>
      </div>
      <div class="area-subtotal" aria-label="區域面積">
        <div class="subtotal-box">
          <div class="label">區域面積 · 平方米（m²）</div>
          <div class="value area-m2">0.00</div>
        </div>
        <div class="subtotal-box">
          <div class="label">區域面積 · 平方呎（ft²）</div>
          <div class="value area-ft2">0.00</div>
        </div>
      </div>
    </article>
  </template>

  <script>
    (function () {
      "use strict";

      const M2_TO_FT2 = 10.763910416709722;

      const plankLengthEl = document.getElementById("plank-length");
      const plankWidthEl = document.getElementById("plank-width");
      const piecesPerPackEl = document.getElementById("pieces-per-pack");
      const wastePercentEl = document.getElementById("waste-percent");
      const areasListEl = document.getElementById("areas-list");
      const addAreaBtn = document.getElementById("add-area-btn");
      const areaTemplate = document.getElementById("area-card-template");

      let areaCounter = 0;

      function parseNonNegative(value) {
        const n = parseFloat(value);
        if (Number.isNaN(n) || n < 0) return 0;
        return n;
      }

      function formatArea(m2) {
        return m2.toLocaleString("zh-Hant", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function m2ToFt2(m2) {
        return m2 * M2_TO_FT2;
      }

      function setDualUnits(container, m2) {
        const m2El = container.querySelector("[data-m2]");
        const ft2El = container.querySelector("[data-ft2]");
        if (m2El) m2El.textContent = formatArea(m2);
        if (ft2El) ft2El.textContent = formatArea(m2ToFt2(m2));
      }

      function clampInput(el) {
        if (el.value === "" || el.value === "-") return;
        const n = parseFloat(el.value);
        if (!Number.isNaN(n) && n < 0) el.value = "0";
      }

      function getPlankAreaM2() {
        const lengthMm = parseNonNegative(plankLengthEl.value);
        const widthMm = parseNonNegative(plankWidthEl.value);
        const lengthM = lengthMm / 1000;
        const widthM = widthMm / 1000;
        return lengthM * widthM;
      }

      function getPackCoverageM2() {
        const plankArea = getPlankAreaM2();
        const pieces = parseNonNegative(piecesPerPackEl.value);
        return plankArea * pieces;
      }

      function collectAreas() {
        const cards = areasListEl.querySelectorAll(".area-card");
        let totalM2 = 0;
        const areas = [];

        cards.forEach(function (card) {
          const length = parseNonNegative(card.querySelector(".area-length").value);
          const width = parseNonNegative(card.querySelector(".area-width").value);
          const subM2 = length * width;
          totalM2 += subM2;

          const m2El = card.querySelector(".area-m2");
          const ft2El = card.querySelector(".area-ft2");
          if (m2El) m2El.textContent = formatArea(subM2);
          if (ft2El) ft2El.textContent = formatArea(m2ToFt2(subM2));

          areas.push({ card, subM2 });
        });

        return { totalM2, areas };
      }

      function updateResults() {
        const { totalM2 } = collectAreas();
        const wastePct = parseNonNegative(wastePercentEl.value);
        const packCoverage = getPackCoverageM2();
        const withWaste = totalM2 * (1 + wastePct / 100);

        let packs = 0;
        let isPlaceholder = false;
        if (packCoverage > 0 && withWaste > 0) {
          packs = Math.ceil(withWaste / packCoverage);
        } else if (packCoverage <= 0 && withWaste > 0) {
          isPlaceholder = true;
        }

        setDualUnits(document.getElementById("result-total-area"), totalM2);
        setDualUnits(document.getElementById("result-waste-area"), withWaste);
        setDualUnits(document.getElementById("result-pack-coverage"), packCoverage);

        const packsEl = document.querySelector("#result-packs [data-packs]");
        const packsCard = document.getElementById("result-packs");
        packsCard.classList.toggle("placeholder", isPlaceholder);
        if (packsEl) {
          packsEl.textContent = isPlaceholder ? "—" : String(packs);
        }
      }

      function bindAreaCard(card) {
        const inputs = card.querySelectorAll("input");
        inputs.forEach(function (input) {
          input.addEventListener("input", function () {
            clampInput(input);
            updateResults();
          });
        });

        const removeBtn = card.querySelector(".remove-area-btn");
        removeBtn.addEventListener("click", function () {
          const count = areasListEl.querySelectorAll(".area-card").length;
          if (count <= 1) return;
          card.remove();
          renumberAreas();
          updateRemoveButtons();
          updateResults();
        });
      }

      function renumberAreas() {
        const cards = areasListEl.querySelectorAll(".area-card");
        cards.forEach(function (card, index) {
          const num = index + 1;
          const title = card.querySelector(".area-title");
          const nameInput = card.querySelector(".area-name");
          if (title) title.textContent = "區域 " + num;
          if (nameInput && !nameInput.dataset.userNamed) {
            const defaultName = "區域 " + num;
            if (!nameInput.value || nameInput.value.match(/^區域 \d+$/)) {
              nameInput.value = defaultName;
              nameInput.placeholder = defaultName;
            }
          }
          card.setAttribute("aria-label", "施工區域 " + num);
        });
      }

      function updateRemoveButtons() {
        const count = areasListEl.querySelectorAll(".area-card").length;
        areasListEl.querySelectorAll(".remove-area-btn").forEach(function (btn) {
          btn.disabled = count <= 1;
        });
      }

      function createAreaCard() {
        areaCounter += 1;
        const clone = areaTemplate.content.cloneNode(true);
        const card = clone.querySelector(".area-card");
        card.dataset.areaId = String(areaCounter);

        const nameInput = card.querySelector(".area-name");
        nameInput.addEventListener("input", function () {
          nameInput.dataset.userNamed = nameInput.value.trim() ? "1" : "";
          updateResults();
        });

        areasListEl.appendChild(clone);
        const mounted = areasListEl.lastElementChild;
        bindAreaCard(mounted);
        renumberAreas();
        updateRemoveButtons();
        updateResults();
        return mounted;
      }

      [plankLengthEl, plankWidthEl, piecesPerPackEl, wastePercentEl].forEach(function (el) {
        el.addEventListener("input", function () {
          clampInput(el);
          updateResults();
        });
      });

      addAreaBtn.addEventListener("click", function () {
        createAreaCard();
      });

      const resetBtn = document.getElementById("reset-btn");
      resetBtn.addEventListener("click", function () {
        plankLengthEl.value = "1220";
        plankWidthEl.value = "180";
        piecesPerPackEl.value = "8";
        wastePercentEl.value = "0";
        areasListEl.innerHTML = "";
        areaCounter = 0;
        createAreaCard();
      });

      createAreaCard();
    })();
  </script>
</body>
</html>
