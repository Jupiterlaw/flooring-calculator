<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地板材料計算器</title>
  <style>
    :root {
      --bg: #f4f1ec; --surface: #fff; --surface-2: #faf8f5;
      --border: #e2ddd4; --border-focus: #2d5a4a;
      --text: #2c2926; --text-muted: #6b6560; --text-faint: #9b9590;
      --accent: #2d5a4a; --accent-hover: #234839; --accent-soft: rgba(45,90,74,.12);
      --danger: #9b3b32; --danger-soft: rgba(155,59,50,.1);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.06); --shadow-md: 0 4px 20px rgba(0,0,0,.08);
      --radius: 12px; --radius-sm: 8px;
      --font: system-ui,-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1917; --surface: #242322; --surface-2: #2a2928;
        --border: #3a3632; --border-focus: #4a8c73;
        --text: #e8e4df; --text-muted: #9b9590; --text-faint: #6b6965;
        --accent: #4a8c73; --accent-hover: #3d7962; --accent-soft: rgba(74,140,115,.15);
        --danger: #c45b52; --danger-soft: rgba(196,91,82,.15);
        --shadow-sm: 0 2px 8px rgba(0,0,0,.3); --shadow-md: 0 4px 20px rgba(0,0,0,.4);
      }
    }
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:var(--font);font-size:16px;line-height:1.55;color:var(--text);background:var(--bg)}

    .app{max-width:480px;margin:0 auto;padding:1.25rem 1rem 2rem}

    .header{text-align:center;margin-bottom:1.5rem}
    .header h1{margin:0 0 .25rem;font-size:1.5rem;font-weight:700}
    .header p{margin:0;font-size:.95rem;color:var(--text-muted)}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
    .card-title{margin:0 0 1rem;font-size:1rem;font-weight:650;display:flex;align-items:center;gap:.5rem}
    .card-title::before{content:"";width:3px;height:1em;background:var(--accent);border-radius:2px}

    .field-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.875rem}
    @media(max-width:600px){.field-grid{grid-template-columns:1fr}}

    .field{display:flex;flex-direction:column;gap:.3rem}
    .field label{font-size:.875rem;font-weight:600}
    .field .hint{font-size:.8rem;color:var(--text-muted)}

    input[type="number"],input[type="text"]{
      width:100%;padding:.6rem .75rem;font:inherit;font-size:1rem;
      color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);
      transition:border-color .15s,box-shadow .15s;
    }
    input:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-soft)}

    .btn-row{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:.3rem;
      padding:.55rem 1rem;font:inherit;font-size:.95rem;font-weight:600;
      border:none;border-radius:var(--radius-sm);cursor:pointer;
      transition:background .15s,transform .08s;
    }
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-ghost{background:transparent;color:var(--danger);border:1px solid var(--danger-soft);font-size:.85rem;padding:.4rem .7rem}
    .btn-ghost:hover{background:var(--danger-soft)}
    .btn-ghost:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

    .areas-header{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.75rem}
    .areas-header .card-title{margin:0}

    .areas-list{display:flex;flex-direction:column;gap:.75rem}
    .area-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
    .area-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
    .area-card-head h3{margin:0;font-size:.95rem;font-weight:650;color:var(--accent)}

    .area-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:.75rem}
    @media(max-width:640px){.area-fields{grid-template-columns:1fr}}

    .area-subtotal{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;padding-top:.6rem;border-top:1px dashed var(--border)}
    @media(max-width:480px){.area-subtotal{grid-template-columns:1fr}}

    .subtotal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .6rem}
    .subtotal-box .label{font-size:.75rem;font-weight:600;color:var(--text-muted)}
    .subtotal-box .value{font-size:1rem;font-weight:700;font-variant-numeric:tabular-nums}

    .waste-field{max-width:200px}

    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:.5rem}
    .result-label{font-size:.85rem;font-weight:600;color:var(--text-muted);margin-bottom:.4rem}
    .dual{display:flex;flex-direction:column;gap:.15rem}
    .dual span{font-size:.95rem;font-weight:700;font-variant-numeric:tabular-nums}
    .dual .unit{font-size:.8rem;font-weight:600;color:var(--text-muted)}

    .result-card.highlight{background:var(--accent);color:#fff;border-color:transparent}
    .result-card.highlight .result-label{color:rgba(255,255,255,.85)}
    .result-card.highlight .pack-value{font-size:2rem;font-weight:800;line-height:1.1;font-variant-numeric:tabular-nums}
    .result-card.highlight .pack-unit{font-size:.85rem;opacity:.9;margin-top:.2rem}
    .result-card.placeholder .dual span,.result-card.placeholder .pack-value{color:var(--text-muted);font-weight:600}

    .footer-note{text-align:center;margin-top:1.25rem;font-size:.75rem;color:var(--text-muted)}

    @media print{
      body{background:#fff}.btn{display:none}
      .card,.area-card{box-shadow:none;border:1px solid #ccc}
      input{border:none;padding:0;background:transparent}
      .result-card.highlight{background:#eee;color:#000;border:1px solid #ccc}
      .result-card.highlight .result-label,.result-card.highlight .pack-unit{color:#333}
      .footer-note{display:none}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>地板材料計算器</h1>
      <p>輸入地板規格及施工區域尺寸，自動計算所需面積與包數。</p>
    </header>

    <section class="card" aria-labelledby="product-heading">
      <h2 class="card-title" id="product-heading">地板產品資料</h2>
      <div class="field-grid">
        <div class="field">
          <label for="plank-length">地板長度（毫米）</label>
          <input type="number" id="plank-length" min="0" step="1" value="1220" inputmode="decimal">
          <span class="hint">單片長度</span>
        </div>
        <div class="field">
          <label for="plank-width">地板闊度（毫米）</label>
          <input type="number" id="plank-width" min="0" step="1" value="180" inputmode="decimal">
          <span class="hint">單片闊度</span>
        </div>
        <div class="field">
          <label for="pieces-per-pack">每包片數</label>
          <input type="number" id="pieces-per-pack" min="0" step="1" value="8" inputmode="numeric">
          <span class="hint">每包包含片數</span>
        </div>
      </div>
    </section>

    <section class="card" aria-labelledby="waste-heading">
      <h2 class="card-title" id="waste-heading">損耗設定</h2>
      <div class="field waste-field">
        <label for="waste-percent">損耗百分比（%）</label>
        <input type="number" id="waste-percent" min="0" step="0.1" value="10" inputmode="decimal">
        <span class="hint">裁邊預留比例</span>
      </div>
    </section>

    <section class="card" aria-labelledby="areas-heading">
      <div class="areas-header">
        <h2 class="card-title" id="areas-heading">施工區域</h2>
        <button type="button" class="btn btn-primary" id="add-area-btn">＋ 新增區域</button>
        <button type="button" class="btn btn-ghost" id="reset-btn">重設</button>
      </div>
      <div class="areas-list" id="areas-list" role="list"></div>
    </section>

    <section aria-labelledby="results-heading" aria-live="polite">
      <div class="card">
        <h2 class="card-title" id="results-heading">計算結果</h2>
        <div class="result-card" id="result-total-area">
          <div class="result-label">總施工面積</div>
          <div class="dual">
            <span><span class="unit">m²</span> <span data-m2>0.00</span></span>
            <span><span class="unit">ft²</span> <span data-ft2>0.00</span></span>
          </div>
        </div>
        <div class="result-card" id="result-waste-area">
          <div class="result-label">加損耗後面積</div>
          <div class="dual">
            <span><span class="unit">m²</span> <span data-m2>0.00</span></span>
            <span><span class="unit">ft²</span> <span data-ft2>0.00</span></span>
          </div>
        </div>
        <div class="result-card" id="result-pack-coverage">
          <div class="result-label">每包覆蓋面積</div>
          <div class="dual">
            <span><span class="unit">m²</span> <span data-m2>0.00</span></span>
            <span><span class="unit">ft²</span> <span data-ft2>0.00</span></span>
          </div>
        </div>
        <div class="result-card highlight" id="result-packs">
          <div class="result-label">所需包數</div>
          <div class="pack-value" data-packs>0</div>
          <div class="pack-unit">包（已向上取整）</div>
        </div>
      </div>
    </section>

    <p class="footer-note">1 m² = 10.7639 ft² · 面積即時計算</p>
  </div>

  <template id="area-card-template">
    <article class="area-card" role="listitem" data-area-id="">
      <div class="area-card-head">
        <h3 class="area-title"></h3>
        <button type="button" class="btn btn-ghost remove-area-btn">刪除</button>
      </div>
      <div class="area-fields">
        <div class="field">
          <label class="area-name-label">區域名稱</label>
          <input type="text" class="area-name" placeholder="例如 客廳" maxlength="40">
        </div>
        <div class="field">
          <label class="area-length-label">長度（米）</label>
          <input type="number" class="area-length" min="0" step="0.01" placeholder="0" inputmode="decimal">
        </div>
        <div class="field">
          <label class="area-width-label">闊度（米）</label>
          <input type="number" class="area-width" min="0" step="0.01" placeholder="0" inputmode="decimal">
        </div>
      </div>
      <div class="area-subtotal" aria-label="區域面積">
        <div class="subtotal-box">
          <div class="label">m²</div>
          <div class="value area-m2">0.00</div>
        </div>
        <div class="subtotal-box">
          <div class="label">ft²</div>
          <div class="value area-ft2">0.00</div>
        </div>
      </div>
    </article>
  </template>

  <script>
    (function () {
      "use strict";
      const M2_TO_FT2 = 10.763910416709722;
      const plankLengthEl = document.getElementById("plank-length");
      const plankWidthEl = document.getElementById("plank-width");
      const piecesPerPackEl = document.getElementById("pieces-per-pack");
      const wastePercentEl = document.getElementById("waste-percent");
      const areasListEl = document.getElementById("areas-list");
      const addAreaBtn = document.getElementById("add-area-btn");
      const areaTemplate = document.getElementById("area-card-template");
      let areaCounter = 0;
      function parseNonNegative(v) { const n = parseFloat(v); return (Number.isNaN(n) || n < 0) ? 0 : n; }
      function formatArea(m2) { return m2.toLocaleString("zh-Hant", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
      function m2ToFt2(m2) { return m2 * M2_TO_FT2; }
      function setDualUnits(c, m2) {
        const m = c.querySelector("[data-m2]"), f = c.querySelector("[data-ft2]");
        if (m) m.textContent = formatArea(m2);
        if (f) f.textContent = formatArea(m2ToFt2(m2));
      }
      function clampInput(el) { if (el.value === "" || el.value === "-") return; const n = parseFloat(el.value); if (!Number.isNaN(n) && n < 0) el.value = "0"; }
      function getPlankAreaM2() { return (parseNonNegative(plankLengthEl.value) / 1000) * (parseNonNegative(plankWidthEl.value) / 1000); }
      function getPackCoverageM2() { return getPlankAreaM2() * parseNonNegative(piecesPerPackEl.value); }
      function collectAreas() {
        const cards = areasListEl.querySelectorAll(".area-card"); let totalM2 = 0;
        cards.forEach(function (card) {
          const subM2 = parseNonNegative(card.querySelector(".area-length").value) * parseNonNegative(card.querySelector(".area-width").value);
          totalM2 += subM2;
          const m = card.querySelector(".area-m2"), f = card.querySelector(".area-ft2");
          if (m) m.textContent = formatArea(subM2);
          if (f) f.textContent = formatArea(m2ToFt2(subM2));
        });
        return totalM2;
      }
      function updateResults() {
        const totalM2 = collectAreas(), wastePct = parseNonNegative(wastePercentEl.value);
        const packCoverage = getPackCoverageM2(), withWaste = totalM2 * (1 + wastePct / 100);
        let packs = 0, isPlaceholder = false;
        if (packCoverage > 0 && withWaste > 0) packs = Math.ceil(withWaste / packCoverage);
        else if (packCoverage <= 0 && withWaste > 0) isPlaceholder = true;
        setDualUnits(document.getElementById("result-total-area"), totalM2);
        setDualUnits(document.getElementById("result-waste-area"), withWaste);
        setDualUnits(document.getElementById("result-pack-coverage"), packCoverage);
        const packsEl = document.querySelector("#result-packs [data-packs]");
        const packsCard = document.getElementById("result-packs");
        packsCard.classList.toggle("placeholder", isPlaceholder);
        if (packsEl) packsEl.textContent = isPlaceholder ? "—" : String(packs);
      }
      function bindAreaCard(card) {
        card.querySelectorAll("input").forEach(function (inp) {
          inp.addEventListener("input", function () { clampInput(inp); updateResults(); });
        });
        card.querySelector(".remove-area-btn").addEventListener("click", function () {
          if (areasListEl.querySelectorAll(".area-card").length <= 1) return;
          card.remove(); renumberAreas(); updateRemoveButtons(); updateResults();
        });
      }
      function renumberAreas() {
        areasListEl.querySelectorAll(".area-card").forEach(function (card, i) {
          const n = i + 1, t = card.querySelector(".area-title"), ni = card.querySelector(".area-name");
          if (t) t.textContent = "區域 " + n;
          if (ni && !ni.dataset.userNamed && (!ni.value || ni.value.match(/^區域 \d+$/))) {
            ni.value = "區域 " + n; ni.placeholder = "區域 " + n;
          }
          card.setAttribute("aria-label", "施工區域 " + n);
        });
      }
      function updateRemoveButtons() {
        const c = areasListEl.querySelectorAll(".area-card").length;
        areasListEl.querySelectorAll(".remove-area-btn").forEach(function (b) { b.disabled = c <= 1; });
      }
      function createAreaCard() {
        areaCounter++;
        const clone = areaTemplate.content.cloneNode(true), card = clone.querySelector(".area-card");
        card.dataset.areaId = String(areaCounter);
        const ni = card.querySelector(".area-name");
        ni.addEventListener("input", function () { ni.dataset.userNamed = ni.value.trim() ? "1" : ""; updateResults(); });
        areasListEl.appendChild(clone);
        bindAreaCard(areasListEl.lastElementChild); renumberAreas(); updateRemoveButtons(); updateResults();
      }
      [plankLengthEl, plankWidthEl, piecesPerPackEl, wastePercentEl].forEach(function (el) {
        el.addEventListener("input", function () { clampInput(el); updateResults(); });
      });
      addAreaBtn.addEventListener("click", function () { createAreaCard(); });
      document.getElementById("reset-btn").addEventListener("click", function () {
        plankLengthEl.value = "1220"; plankWidthEl.value = "180";
        piecesPerPackEl.value = "8"; wastePercentEl.value = "0";
        areasListEl.innerHTML = ""; areaCounter = 0; createAreaCard();
      });
      createAreaCard();
    })();
  </script>
</body>
</html>
